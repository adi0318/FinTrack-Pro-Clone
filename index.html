<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack Pro</title>

    <link rel="stylesheet" href="css/login.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">

      <div class="card" id="loginCard">
        <h1>Welcome Back</h1>

        <p>Login to FinTrack Pro</p>

        <form id="loginForm">
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Enter Email" required/>
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter Password" required/>
          </div>

          <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="switch">
          Don't have an account?
          <span id="showRegister"> Register here </span>
        </div>

      </div>

      <div class="card hidden" id="registerCard">
        <h1>Create Account</h1>
        <p>Create your FinTrack Pro account</p>

        <form id="registerForm">
          <div class="input-group">
            <label>Username</label>

            <input type="text" id="username" placeholder="Enter Username" required/>
          </div>

          <div class="input-group">
            <label>Email</label>

            <input type="email" id="registerEmail" placeholder="Enter Email" required/>
          </div>

          <div class="input-group">
            <label>Password</label>

            <input type="password" id="registerPassword" placeholder="Enter Password" required/>
          </div>

          <div class="input-group">
            <label>Confirm Password</label>

            <input type="password" id="confirmPassword" placeholder="Confirm Password" required/>
          </div>

          <button type="submit" class="register-btn">Register</button>
        </form>

        <div class="switch">
          Already have an account?
          <span id="showLogin"> Login Here </span>

        </div>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
